services:
  # Backend Web Service
  - type: web
    name: rb-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rb-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rb-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_SERVER
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

  # Celery Worker
  - type: worker
    name: rb-worker
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A main.celery_app worker --loglevel=info
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rb-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rb-redis
          property: connectionString

  # Frontend Web Service (Next.js)
  - type: web
    name: rb-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: rb-backend
          property: url

databases:
  - name: rb-db
    plan: free

# Redis for Celery
  - type: redis
    name: rb-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
