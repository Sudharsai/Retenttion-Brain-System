services:
  # Backend API
  - type: web
    name: rb-backend
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rb-database
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rb-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # Celery Worker
  - type: worker
    name: rb-worker
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && celery -A workers.tasks worker --loglevel=info"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rb-database
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: rb-redis
          property: connectionString

  # Frontend (Static Next.js Build)
  - type: web
    name: rb-frontend
    env: node
    buildCommand: "cd frontend && npm install && npm run build"
    startCommand: "cd frontend && npm start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: rb-backend
          property: host

databases:
  - name: rb-database
    plan: free

redis:
  - name: rb-redis
    plan: free
    ipAllowList: [] # Only allow internal connections
