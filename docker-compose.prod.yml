services:
  postgres:
    image: postgres:16-alpine
    container_name: rb-database-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retention_brain}
      POSTGRES_USER: ${POSTGRES_USER:-rb_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rb_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: rb-redis-prod
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rb-backend-prod
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rb_admin}:${POSTGRES_PASSWORD:-rb_password}@postgres:5432/${POSTGRES_DB:-retention_brain}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    # No local volume mapping for production consistency
    volumes:
      - temp_uploads_prod:/app/temp_uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rb-worker-prod
    command: celery -A main.celery_app worker --loglevel=info
    restart: always
    volumes:
      - temp_uploads_prod:/app/temp_uploads
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rb_admin}:${POSTGRES_PASSWORD:-rb_password}@postgres:5432/${POSTGRES_DB:-retention_brain}
      - REDIS_URL=redis://redis:6379/0
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TASK_ALWAYS_EAGER=false
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASS=${SMTP_PASS}
    depends_on:
      - backend
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rb-frontend-prod
    restart: always
    ports:
      - "3000:3000"
    # No volume mapping for code in production
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend

volumes:
  postgres_data_prod:
  temp_uploads_prod:
