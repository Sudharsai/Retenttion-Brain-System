services:
  mysql:
    image: mysql:8.0
    container_name: rb-database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-retention_brain}
      MYSQL_USER: ${MYSQL_USER:-rb_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rb_password}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    image: rb-backend:latest
    container_name: rb-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-rb_user}:${MYSQL_PASSWORD:-rb_password}@mysql:3306/${MYSQL_DATABASE:-retention_brain}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - AUTO_MIGRATE=true
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A main.celery_app worker --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-rb_user}:${MYSQL_PASSWORD:-rb_password}@mysql:3306/${MYSQL_DATABASE:-retention_brain}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - backend
      - redis
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: rb-frontend:latest
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  mysql_data:
