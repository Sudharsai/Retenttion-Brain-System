services:
  postgres:
    image: postgres:16-alpine
    container_name: rb-database
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-retention_brain}
      POSTGRES_USER: ${POSTGRES_USER:-rb_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rb_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: rb-redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rb-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rb_admin}:${POSTGRES_PASSWORD:-rb_password}@postgres:5432/${POSTGRES_DB:-retention_brain}
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
    volumes:
      - temp_uploads:/app/temp_uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: rb-worker
    command: celery -A main.celery_app worker --loglevel=info
    restart: always
    volumes:
      - temp_uploads:/app/temp_uploads
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rb_admin}:${POSTGRES_PASSWORD:-rb_password}@postgres:5432/${POSTGRES_DB:-retention_brain}
      - REDIS_URL=redis://redis:6379/0
      - TASK_ALWAYS_EAGER=${TASK_ALWAYS_EAGER:-false}
    depends_on:
      - backend
      - redis
      - postgres

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rb-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  postgres_data:
  temp_uploads:
